<!DOCTYPE html>
<html>
<head>

<div class="top-bar">

</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <div class="heading-wrapper">
      <h1 class="role-heading">Choose your role below:</h1>
  </div>

  <div class="role-container">

    <!-- Doctor Card -->
    <div class="role-card" onclick="window.location.href='doctor-login.html'">
      <img src="d-card.jpg" class="role-image">
      <h3>Doctor</h3>
      <p>Manage appointments, prescriptions & patient records.</p>
    </div>

    <!-- Patient Card -->
    <div class="role-card" onclick="window.location.href='patient-login.html'">
  <img src="p-card.jpg" class="role-image">
  <h3>Patient</h3>
  <p>Access your health records & medication schedule.</p>
</div>

    <!-- Caregiver Card -->
    <div class="role-card" onclick="window.location.href='caretaker.html'">
      <img src="c-card.jpg" class="role-image">
      <h3>Caregiver</h3>
      <p>Assist patients and manage their daily health updates.</p>
    </div>

  </div>

</div>

</html>
