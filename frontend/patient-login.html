<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Sign Up</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="css/patient-login.css">
</head>
<body>
    <div class="container">
        <form class="modern-form" id="signupForm">
        <div class="head">
            <div class="heading">Patient Details</div>
        </div>
        <div class="form-title">Sign Up</div>
        <div class="form-body">
            <div class="input-group">
                <div class="input-wrapper">
                    <input placeholder="First Name" class="form-input" type="text" id="firstName" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input placeholder="Middle Name" class="form-input" type="text" id="middleName">
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input placeholder="Last Name" class="form-input" type="text" id="lastName" required>
                </div>
            </div><br><hr><br>

            <div class="input-group">
                <div class="input-wrapper">
                    <input placeholder="Email" class="form-input" type="email" id="email" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input placeholder="Age" class="form-input" type="number" id="age" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                  <select class="form-input" id="gender">
    <option value="Not Specified">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
</select>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input placeholder="Phone Number" class="form-input" type="text" id="phone" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input placeholder="Create Password" class="form-input" type="password" id="password" required>
                </div>
            </div>
        </div>

        <button class="submit-button" type="submit">
            <span class="button-text">Create Account</span>
            <div class="button-glow"></div>
        </button>

        <div class="form-footer">
            <a class="login-link" href="#">
                Already have an account? <span>Login</span>
            </a>
        </div>

        </form>
    </div>

<script>
document.getElementById("signupForm").addEventListener("submit", async function(event) {
    event.preventDefault(); 

    // 1. Get field values
    const firstName = document.getElementById("firstName").value.trim();
    const middleName = document.getElementById("middleName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    const age = document.getElementById("age").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();
    const gender = document.getElementById("gender").value;

    if (!firstName || !lastName || !email || !age || !phone || !password) {
        alert("Please fill all required fields!");
        return;
    }

    // 2. Prepare Data for Backend
    // Combine names because backend expects a single "name" field
    const fullName = `${firstName} ${middleName} ${lastName}`.trim();

    const payload = {
        username: email, // Mapping email to username
        password: password,
        name: fullName,
        age: age,
        phone: phone,
        gender: gender
    };

    // 3. Send to Backend
    try {
        const response = await fetch("http://localhost:5001/api/patient-auth/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.success) {
            alert("Account Created Successfully!");
            window.location.href = "home.html"; // Redirect only on success
        } else {
            alert("Error: " + data.message); // Show error (e.g., "Username already exists")
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Cannot connect to server. Make sure 'node server.js' is running.");
    }
});
</script>

</body>
</html>
