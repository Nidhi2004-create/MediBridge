<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal</title>
    <link rel="stylesheet" href="css/patient-login.css">
</head>
<body>
    <div class="container">
      <div class="modern-form" id="formWrapper">
        <div class="head">
          <div class="heading">Patient Portal</div>
        </div>

        <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:24px;">
          <button type="button" id="signupTab" class="tab-button active">Sign Up</button>
          <button type="button" id="loginTab" class="tab-button">Login</button>
        </div>

        <div id="signupSection">
          <div class="form-title">Create your account</div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="First Name" class="form-input" type="text" id="firstName" required></div></div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="Middle Name" class="form-input" type="text" id="middleName"></div></div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="Last Name" class="form-input" type="text" id="lastName" required></div></div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="Email" class="form-input" type="email" id="email" required></div></div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="Age" class="form-input" type="number" id="age" required></div></div>
          <div class="input-group"><div class="input-wrapper"><select class="form-input" id="gender"><option value="Not Specified">Select Gender</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div></div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="Phone Number" class="form-input" type="text" id="phone" required></div></div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="Create Password" class="form-input" type="password" id="password" required></div></div>
          <button class="submit-button" id="signupButton">Create Account<div class="button-glow"></div></button>
        </div>

        <div id="loginSection" style="display:none;">
          <div class="form-title">Welcome back</div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="Email" class="form-input" type="email" id="loginEmail" required></div></div>
          <div class="input-group"><div class="input-wrapper"><input placeholder="Password" class="form-input" type="password" id="loginPassword" required></div></div>
          <button class="submit-button" id="loginButton">Login<div class="button-glow"></div></button>
        </div>

        <div class="form-footer">
            <a class="login-link" href="index.html">← Back to Home</a>
        </div>
      </div>
    </div>

<script>
const signupTab = document.getElementById('signupTab');
const loginTab = document.getElementById('loginTab');
const signupSection = document.getElementById('signupSection');
const loginSection = document.getElementById('loginSection');

function setActiveTab(tab) {
  if (tab === 'login') {
    signupSection.style.display = 'none';
    loginSection.style.display = 'block';
    signupTab.classList.remove('active');
    loginTab.classList.add('active');
  } else {
    signupSection.style.display = 'block';
    loginSection.style.display = 'none';
    signupTab.classList.add('active');
    loginTab.classList.remove('active');
  }
}

signupTab.addEventListener('click', () => setActiveTab('signup'));
loginTab.addEventListener('click', () => setActiveTab('login'));

async function signupPatient(event) {
  event.preventDefault();
  const firstName = document.getElementById('firstName').value.trim();
  const middleName = document.getElementById('middleName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const email = document.getElementById('email').value.trim();
  const age = document.getElementById('age').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const gender = document.getElementById('gender').value;

  if (!firstName || !lastName || !email || !age || !phone || !password) {
    alert('Please fill all required fields');
    return;
  }

  const payload = {
    username: email,
    password,
    name: `${firstName} ${middleName} ${lastName}`.trim(),
    age,
    phone,
    gender
  };

  try {
    const response = await fetch('http://localhost:5001/api/patient-auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await response.json();
    if (data.success) {
      alert('Account created successfully!');
      window.location.href = 'home.html';
    } else {
      alert(data.message || 'Signup failed');
    }
  } catch (err) {
    console.error(err);
    alert('Cannot connect to server. Make sure backend is running.');
  }
}

async function loginPatient(event) {
  event.preventDefault();
  const username = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) {
    alert('Please enter email and password');
    return;
  }
  try {
    const response = await fetch('http://localhost:5001/api/patient-auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await response.json();
    if (data.success) {
      localStorage.setItem('patientId', data.patientId);
      window.location.href = 'home.html';
    } else {
      alert(data.message || 'Login failed');
    }
  } catch (err) {
    console.error(err);
    alert('Cannot connect to server. Make sure backend is running.');
  }
}

document.getElementById('signupButton').addEventListener('click', signupPatient);
document.getElementById('loginButton').addEventListener('click', loginPatient);
</script>
</body>
</html>
