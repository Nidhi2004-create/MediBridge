<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-split">

  <!-- LEFT IMAGE -->
  <div class="login-left">
    <img src="doctor.jpeg" class="login-side-img">
  </div>

  <!-- RIGHT LOGIN CARD -->
  <div class="login-right">

    <div class="login-container">

      <img src="logo.png" class="login-logo">

      <h1 class="login-title">Doctor Login</h1>

      <form id="doctorForm" class="login-form">

        <input type="text" id="username" placeholder="Username" required>

        <div class="password-wrapper" style="position:relative; width:90%; margin:0 auto 15px;">
          <input type="password" id="password" placeholder="Password" required style="width:100%; padding-right:74px;" />
          <span class="toggle-pass" id="togglePass" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:#2563eb; font-weight:600;">Show</span>
        </div>

        <button type="submit" class="login-btn">Login</button>

      </form>

      <a href="index.html" class="back-link">← Back</a>

    </div>

  </div>

</div>

<script src="js/doctor-login.js"></script>
</body>
</html>
