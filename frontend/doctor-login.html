<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-split">

  <!-- LEFT IMAGE -->
  <div class="login-left">
    <img src="doctor.jpeg" class="login-side-img">
  </div>

  <!-- RIGHT LOGIN CARD -->
  <div class="login-right">

    <div class="login-container">

      <img src="logo.png" class="login-logo">

      <h1 class="login-title">Doctor Login</h1>

      <form id="doctorForm" class="login-form">

        <input type="text" id="username" placeholder="Username" required>

        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle-pass" id="togglePass">Show</span>
        </div>

        <button type="submit" class="login-btn">Login</button>

      </form>

      <a href="index.html" class="back-link">← Back</a>

    </div>

  </div>

</div>

<script>
    // EMERGENCY BYPASS SCRIPT
    // This ignores the server and just lets you in.
    
    // Toggle Password Visibility
    window.togglePasswordVisibility = function() {
        const passwordField = document.getElementById('password'); 
        const showButton = document.querySelector('.show-button');
        if (passwordField && showButton) {
            if (passwordField.type === "password") {
                passwordField.type = "text";
                showButton.textContent = "Hide";
            } else {
                passwordField.type = "password";
                showButton.textContent = "Show";
            }
        }
    }

    // FAKE LOGIN LOGIC
    document.querySelector("form").addEventListener("submit", function(e) {
        e.preventDefault(); 
        
        // Pretend we logged in successfully
        localStorage.setItem("doctorId", "demo-id");
        localStorage.setItem("doctorName", "Dr. Sharma");
        
        // Just go to the dashboard
        window.location.href = "doctor-dashboard.html";
    });
</script>

</body>
</html>
