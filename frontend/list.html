<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doctors Directory</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --muted:#6b7280;
      --accent:#2563eb;
      --glass: rgba(255,255,255,0.6);
      --shadow: 0 6px 18px rgba(18, 38, 63, 0.08);
      --radius:14px;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background: linear-gradient(180deg, var(--bg), #eef2ff);
      color:#0f172a;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:32px;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    header{
      display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;
    }
    h1{font-size:22px;margin:0;font-weight:700}

    /* Grid Layout */
    .grid{
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:18px;
    }

    /* Card Design */
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.9), var(--card));
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
      display:flex;
      gap:12px;
      align-items:flex-start;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .card:hover{transform:translateY(-6px)}

    .avatar{
      width:50px;height:50px;border-radius:12px;flex:0 0 50px;
      display:grid;place-items:center;background:linear-gradient(135deg,#eef2ff,#dbeafe);
      font-weight:700;color:var(--accent);font-size:18px;
    }

    .info{flex:1}
    .name{font-weight:600;margin:0;font-size:16px}
    .spec{color:var(--accent);font-size:13px;font-weight:600;margin-top:2px}
    
    .detail-row {
        font-size: 13px; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 6px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
        <h1>Doctors Directory</h1>
    </header>

    <div id="doctor-grid" class="grid">
        <p>Loading doctors...</p>
    </div>
  </div>

  <script>
    // URL of your Backend API
    const API_URL = "http://localhost:5001/api/doctors";

    async function fetchDoctors() {
        try {
            const response = await fetch(API_URL);
            const doctors = await response.json();
            
            const container = document.getElementById('doctor-grid');
            container.innerHTML = ''; // Clear "Loading..." text

            doctors.forEach(doc => {
                // Get initials for avatar (e.g., "Dr. Asha" -> "DA")
                const initials = doc.name.split(" ").map(n => n[0]).join("").substring(0,2);

                const cardHTML = `
                <div class="card">
                    <div class="avatar">${initials}</div>
                    <div class="info">
                        <h3 class="name">${doc.name}</h3>
                        <p class="spec">${doc.specialty || "General"}</p>
                        
                        <div class="detail-row">
                            <span>📍 ${doc.address || "Location N/A"}</span>
                        </div>
                        <div class="detail-row">
                            <span>📞 ${doc.phone || "N/A"}</span>
                        </div>
                        <div class="detail-row">
                            <span>📧 ${doc.username || "N/A"}</span>
                        </div>
                    </div>
                </div>
                `;
                container.innerHTML += cardHTML;
            });

        } catch (error) {
            console.error("Error fetching doctors:", error);
            document.getElementById('doctor-grid').innerHTML = "<p>Error loading doctors. Is the backend running?</p>";
        }
    }

    // Run the function when page loads
    fetchDoctors();
  </script>

</body>
</html>
