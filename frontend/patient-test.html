<!DOCTYPE html>
<html lang="en">
<head>
    <title>Patient Chat Test</title>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .chat-container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        input { padding: 10px; width: 70%; }
        button { padding: 10px; background: blue; color: white; border: none; cursor: pointer; }
        #messages { height: 300px; border: 1px solid #ccc; overflow-y: auto; margin-bottom: 10px; padding: 10px;}
        .msg { padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Patient View (Vikram Das)</h2>
    <div id="messages"></div>
    <input type="text" id="msg" placeholder="Msg to Doctor...">
    <button onclick="send()">Send</button>
</div>

<script>
    const socket = io("http://localhost:5001");
    const ROOM_ID = "room1"; // Must match Doctor's Room

    socket.emit("join_room", ROOM_ID);

    socket.on("receive_message", (data) => {
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<strong style="color:red">${data.author}:</strong> ${data.message}`;
        document.getElementById("messages").appendChild(div);
    });

    function send() {
        const input = document.getElementById("msg");
        const data = {
            room: ROOM_ID,
            author: "Vikram Das",
            message: input.value
        };
        socket.emit("send_message", data);
        
        // Show my own msg
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<strong>Me:</strong> ${input.value}`;
        document.getElementById("messages").appendChild(div);
        
        input.value = "";
    }
</script>

</body>
</html>
